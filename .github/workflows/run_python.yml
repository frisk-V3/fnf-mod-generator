name: Generate FNF Mod ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt;首fi

      - name: Run script
        run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: my-cool-mod-zip
          path: my-cool-mod.zip
          if-no-files-found: error
